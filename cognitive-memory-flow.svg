<svg viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="24" font-weight="bold" fill="#333">
    Cognitive Memory System - Human-Aware AI
  </text>
  
  <!-- User Input Section -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="200" height="80" fill="#FFE66D" rx="10"/>
    <text x="100" y="30" text-anchor="middle" font-weight="bold">User Input</text>
    <text x="100" y="50" text-anchor="middle" font-size="12">"Emergency filing due!"</text>
    <text x="100" y="70" text-anchor="middle" font-size="10" fill="#666">Emotional Context</text>
  </g>
  
  <!-- Emotional Analysis -->
  <g transform="translate(300, 60)">
    <rect x="0" y="0" width="250" height="80" fill="#FF6B6B" fill-opacity="0.3" stroke="#FF6B6B" stroke-width="2" rx="10"/>
    <text x="125" y="25" text-anchor="middle" font-weight="bold" fill="#FF6B6B">Emotional Analysis</text>
    <text x="125" y="45" text-anchor="middle" font-size="11">Detected: stress, urgency</text>
    <text x="125" y="60" text-anchor="middle" font-size="11">Importance: +0.3 boost</text>
    <text x="125" y="75" text-anchor="middle" font-size="11">State: "stressed"</text>
  </g>
  
  <!-- Transactive Memory -->
  <g transform="translate(600, 60)">
    <rect x="0" y="0" width="250" height="80" fill="#4ECDC4" fill-opacity="0.3" stroke="#4ECDC4" stroke-width="2" rx="10"/>
    <text x="125" y="25" text-anchor="middle" font-weight="bold" fill="#4ECDC4">Memory Ownership</text>
    <text x="125" y="45" text-anchor="middle" font-size="11">Category: Legal</text>
    <text x="125" y="60" text-anchor="middle" font-size="11">Primary: CLAUDESQ</text>
    <text x="125" y="75" text-anchor="middle" font-size="11">Backup: [lawyer, paralegal]</text>
  </g>
  
  <!-- Cognitive State -->
  <g transform="translate(200, 180)">
    <rect x="0" y="0" width="500" height="100" fill="#95E1D3" fill-opacity="0.2" stroke="#95E1D3" stroke-width="2" rx="10" stroke-dasharray="5,5"/>
    <text x="250" y="25" text-anchor="middle" font-weight="bold" fill="#3D5A80">Current Cognitive State</text>
    
    <!-- State indicators -->
    <g transform="translate(50, 40)">
      <circle cx="0" cy="0" r="15" fill="#FF6B6B"/>
      <text x="0" y="5" text-anchor="middle" font-size="10" fill="white">High</text>
      <text x="0" y="25" text-anchor="middle" font-size="10">Stress</text>
    </g>
    
    <g transform="translate(150, 40)">
      <circle cx="0" cy="0" r="15" fill="#FFD93D"/>
      <text x="0" y="5" text-anchor="middle" font-size="10">Normal</text>
      <text x="0" y="25" text-anchor="middle" font-size="10">Load</text>
    </g>
    
    <g transform="translate(250, 40)">
      <circle cx="0" cy="0" r="15" fill="#95E1D3"/>
      <text x="0" y="5" text-anchor="middle" font-size="10">6/10</text>
      <text x="0" y="25" text-anchor="middle" font-size="10">Difficulty</text>
    </g>
    
    <g transform="translate(350, 40)">
      <circle cx="0" cy="0" r="15" fill="#C7CEEA"/>
      <text x="0" y="5" text-anchor="middle" font-size="10">OFF</text>
      <text x="0" y="25" text-anchor="middle" font-size="10">Exercise</text>
    </g>
  </g>
  
  <!-- Memory Storage Decision -->
  <g transform="translate(100, 320)">
    <rect x="0" y="0" width="300" height="120" fill="#5F27CD" fill-opacity="0.1" stroke="#5F27CD" stroke-width="2" rx="10"/>
    <text x="150" y="25" text-anchor="middle" font-weight="bold" fill="#5F27CD">Memory Storage Decision</text>
    
    <text x="150" y="50" text-anchor="middle" font-size="12">✓ Extended decay (stressed)</text>
    <text x="150" y="70" text-anchor="middle" font-size="12">✓ Legal category (permanent)</text>
    <text x="150" y="90" text-anchor="middle" font-size="12">✓ Skip exercise (high stress)</text>
    <text x="150" y="110" text-anchor="middle" font-size="12">✓ Delegate to CLAUDESQ</text>
  </g>
  
  <!-- Search Behavior -->
  <g transform="translate(450, 320)">
    <rect x="0" y="0" width="350" height="120" fill="#00D2D3" fill-opacity="0.1" stroke="#00D2D3" stroke-width="2" rx="10"/>
    <text x="175" y="25" text-anchor="middle" font-weight="bold" fill="#00D2D3">Search Enhancement</text>
    
    <text x="20" y="50" font-size="11" fill="#666">Complex query detected...</text>
    <rect x="15" y="60" width="320" height="25" fill="#EEE" rx="5"/>
    <text x="175" y="77" text-anchor="middle" font-size="11" font-style="italic">"Hmm, let me think about that for a second..."</text>
    <text x="20" y="105" font-size="11">✓ Prioritize actionable results (stressed mode)</text>
  </g>
  
  <!-- Cognitive Exercise System -->
  <g transform="translate(100, 480)">
    <rect x="0" y="0" width="700" height="140" fill="#A8E6CF" fill-opacity="0.2" stroke="#A8E6CF" stroke-width="2" rx="10"/>
    <text x="350" y="25" text-anchor="middle" font-weight="bold" fill="#2ECC71">Cognitive Exercise System (When Enabled)</text>
    
    <!-- Exercise types -->
    <g transform="translate(50, 40)">
      <rect x="0" y="0" width="140" height="70" fill="#3498DB" fill-opacity="0.3" rx="5"/>
      <text x="70" y="20" text-anchor="middle" font-weight="bold" font-size="12">Memory Recall</text>
      <text x="70" y="40" text-anchor="middle" font-size="10">Fill in: "Q4 target: ___"</text>
      <text x="70" y="55" text-anchor="middle" font-size="10">Difficulty adapts</text>
    </g>
    
    <g transform="translate(210, 40)">
      <rect x="0" y="0" width="140" height="70" fill="#9B59B6" fill-opacity="0.3" rx="5"/>
      <text x="70" y="20" text-anchor="middle" font-weight="bold" font-size="12">Association</text>
      <text x="70" y="40" text-anchor="middle" font-size="10">"What does this</text>
      <text x="70" y="55" text-anchor="middle" font-size="10">remind you of?"</text>
    </g>
    
    <g transform="translate(370, 40)">
      <rect x="0" y="0" width="140" height="70" fill="#E74C3C" fill-opacity="0.3" rx="5"/>
      <text x="70" y="20" text-anchor="middle" font-weight="bold" font-size="12">Elaboration</text>
      <text x="70" y="40" text-anchor="middle" font-size="10">"Explain in your</text>
      <text x="70" y="55" text-anchor="middle" font-size="10">own words"</text>
    </g>
    
    <g transform="translate(530, 40)">
      <rect x="0" y="0" width="140" height="70" fill="#F39C12" fill-opacity="0.3" rx="5"/>
      <text x="70" y="20" text-anchor="middle" font-weight="bold" font-size="12">Spaced Review</text>
      <text x="70" y="40" text-anchor="middle" font-size="10">Optimal intervals:</text>
      <text x="70" y="55" text-anchor="middle" font-size="10">1d → 3d → 7d → 30d</text>
    </g>
  </g>
  
  <!-- Transactive Memory Network -->
  <g transform="translate(50, 640)">
    <text x="0" y="0" font-size="14" font-weight="bold" fill="#333">Transactive Memory Network:</text>
    
    <g transform="translate(200, -10)">
      <circle cx="0" cy="0" r="20" fill="#FF6B6B"/>
      <text x="0" y="5" text-anchor="middle" font-size="10" fill="white">User</text>
      <text x="0" y="25" text-anchor="middle" font-size="9">Technical</text>
    </g>
    
    <g transform="translate(300, -10)">
      <circle cx="0" cy="0" r="20" fill="#4ECDC4"/>
      <text x="0" y="5" text-anchor="middle" font-size="10" fill="white">Spouse</text>
      <text x="0" y="25" text-anchor="middle" font-size="9">Personal</text>
    </g>
    
    <g transform="translate(400, -10)">
      <circle cx="0" cy="0" r="20" fill="#5F27CD"/>
      <text x="0" y="5" text-anchor="middle" font-size="8" fill="white">CLAUDEFO</text>
      <text x="0" y="25" text-anchor="middle" font-size="9">Financial</text>
    </g>
    
    <g transform="translate(500, -10)">
      <circle cx="0" cy="0" r="20" fill="#00D2D3"/>
      <text x="0" y="5" text-anchor="middle" font-size="8" fill="white">CLAUDESQ</text>
      <text x="0" y="25" text-anchor="middle" font-size="9">Legal</text>
    </g>
    
    <g transform="translate(600, -10)">
      <circle cx="0" cy="0" r="20" fill="#F39C12"/>
      <text x="0" y="5" text-anchor="middle" font-size="10" fill="white">Team</text>
      <text x="0" y="25" text-anchor="middle" font-size="9">Projects</text>
    </g>
    
    <!-- Connections -->
    <line x1="220" y1="-10" x2="280" y2="-10" stroke="#999" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="320" y1="-10" x2="380" y2="-10" stroke="#999" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="420" y1="-10" x2="480" y2="-10" stroke="#999" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="520" y1="-10" x2="580" y2="-10" stroke="#999" stroke-width="1" stroke-dasharray="2,2"/>
  </g>
  
  <!-- Flow arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666"/>
    </marker>
  </defs>
  
  <!-- Input to Analysis -->
  <path d="M 250 100 L 300 100" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Analysis to Ownership -->
  <path d="M 550 100 L 600 100" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- To Cognitive State -->
  <path d="M 150 140 L 300 180" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 425 140 L 400 180" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 725 140 L 600 180" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- To Storage Decision -->
  <path d="M 350 280 L 250 320" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- To Search -->
  <path d="M 500 280 L 600 320" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Legend -->
  <g transform="translate(50, 670)">
    <text x="0" y="0" font-size="10" fill="#666">
      Key: Emotional awareness → Better importance prediction | Transactive memory → Reduced cognitive load | Natural delays → Human-like interaction | Exercises → Maintained mental fitness
    </text>
  </g>
</svg>